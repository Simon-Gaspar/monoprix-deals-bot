<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promos Monoprix</title>
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --muted: #888;
    --accent: #ff6b35;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 2rem 1.5rem 1rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
  }
  header h1 span { color: var(--accent); }
  .meta {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
  }

  /* Filters */
  .filters {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1.5rem 1rem;
  }
  .filter-group {
    margin-bottom: 1rem;
  }
  .filter-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .chip {
    padding: 0.35rem 0.75rem;
    border-radius: 2rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--text); color: var(--text); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chip .count {
    font-size: 0.7rem;
    opacity: 0.7;
    margin-left: 0.25rem;
  }

  /* Search */
  .search-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1.5rem 1rem;
  }
  .search-wrap input {
    width: 100%;
    max-width: 400px;
    padding: 0.6rem 1rem;
    border-radius: 0.5rem;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  /* Sort */
  .sort-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1.5rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .sort-wrap label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
  }
  .sort-wrap select {
    padding: 0.4rem 0.6rem;
    border-radius: 0.5rem;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 0.8rem;
    outline: none;
    cursor: pointer;
  }
  .sort-wrap select:focus { border-color: var(--accent); }

  /* Grid */
  .grid {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1.5rem 3rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0.75rem;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 0.75rem;
    padding: 0.75rem;
    display: flex;
    gap: 0.75rem;
    align-items: center;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: #444; }
  .card-img {
    width: 72px;
    height: 72px;
    border-radius: 0.5rem;
    object-fit: contain;
    background: #fff;
    flex-shrink: 0;
  }
  .card-body {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.5rem;
  }
  .card-name {
    font-size: 0.85rem;
    font-weight: 500;
    line-height: 1.3;
    flex: 1;
  }
  .card-price {
    font-size: 1.1rem;
    font-weight: 700;
    white-space: nowrap;
    color: #fff;
  }
  .card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.5rem;
  }
  .badge {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.2rem 0.5rem;
    border-radius: 0.3rem;
    white-space: nowrap;
  }
  .badge-21 { background: #22c55e22; color: #4ade80; border: 1px solid #22c55e44; }
  .badge-60 { background: #ef444422; color: #f87171; border: 1px solid #ef444444; }
  .badge-50 { background: #f9731622; color: #fb923c; border: 1px solid #f9731644; }
  .badge-30 { background: #eab30822; color: #fbbf24; border: 1px solid #eab30844; }
  .badge-20 { background: #3b82f622; color: #60a5fa; border: 1px solid #3b82f644; }
  .badge-default { background: #6b728022; color: #9ca3af; border: 1px solid #6b728044; }
  .badge-bon-prix { background: #10b98122; color: #34d399; border: 1px solid #10b98144; font-size: 0.65rem; }
  .card-unit {
    font-size: 0.7rem;
    color: var(--muted);
    font-style: italic;
  }
  .card-cat {
    font-size: 0.7rem;
    color: var(--muted);
  }

  .results-count {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1.5rem 0.75rem;
    font-size: 0.85rem;
    color: var(--muted);
  }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 3rem;
    color: var(--muted);
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    header { padding: 1.5rem 1rem 0.75rem; }
    .filters, .search-wrap, .grid, .results-count { padding-left: 1rem; padding-right: 1rem; }
  }
</style>
</head>
<body>

<header>
  <h1><span>Promos</span> Monoprix</h1>
  <div class="meta" id="meta">Chargement...</div>
</header>

<div class="search-wrap">
  <input type="text" id="search" placeholder="Rechercher un produit...">
</div>

<div class="sort-wrap">
  <label for="sort">Trier par</label>
  <select id="sort">
    <option value="default">Par défaut</option>
    <option value="unit-price">Prix unitaire croissant</option>
    <option value="price">Prix croissant</option>
  </select>
</div>

<div class="filters">
  <div class="filter-group">
    <div class="filter-label">Type de promo</div>
    <div class="chips" id="promo-chips"></div>
  </div>
  <div class="filter-group">
    <div class="filter-label">Rayon</div>
    <div class="chips" id="cat-chips"></div>
  </div>
</div>

<div class="results-count" id="results-count"></div>
<div class="grid" id="grid"></div>

<script>
let DATA = [];
let activePromos = new Set();
let activeCats = new Set();

const BADGE_CLASSES = {
  '2 +1 offert': 'badge-21',
  '2+1 offert': 'badge-21',
  '-68%': 'badge-60',
  '-60%': 'badge-60',
  '-50%': 'badge-50',
  '-34%': 'badge-30',
  '-30%': 'badge-30',
  '-20%': 'badge-20',
};

function getBadgeClass(discount) {
  for (const [k, v] of Object.entries(BADGE_CLASSES)) {
    if (discount.toLowerCase().includes(k.toLowerCase())) return v;
  }
  return 'badge-default';
}

function parseUnitPrice(s) {
  if (!s) return Infinity;
  const m = s.match(/([\d.,]+)/);
  return m ? parseFloat(m[1].replace(',', '.')) : Infinity;
}

function parseUnit(s) {
  if (!s) return '';
  const m = s.match(/€(.+)$/);
  return m ? m[1].trim() : '';
}

function computeBonPrix(deals) {
  // Group by category + unit, find 20th percentile threshold
  const groups = {};
  deals.forEach(d => {
    const up = parseUnitPrice(d.unitPrice);
    const unit = parseUnit(d.unitPrice);
    if (up === Infinity || !unit) return;
    const key = d.category + '|' + unit;
    if (!groups[key]) groups[key] = [];
    groups[key].push(up);
  });

  const thresholds = {};
  for (const [key, prices] of Object.entries(groups)) {
    if (prices.length < 3) continue; // need enough products to compare
    prices.sort((a, b) => a - b);
    const idx = Math.max(0, Math.ceil(prices.length * 0.2) - 1);
    thresholds[key] = prices[idx];
  }

  const bonPrix = new Set();
  deals.forEach((d, i) => {
    const up = parseUnitPrice(d.unitPrice);
    const unit = parseUnit(d.unitPrice);
    if (up === Infinity || !unit) return;
    const key = d.category + '|' + unit;
    if (thresholds[key] !== undefined && up <= thresholds[key]) {
      bonPrix.add(i);
    }
  });
  return bonPrix;
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const sortBy = document.getElementById('sort').value;
  const grid = document.getElementById('grid');

  const filtered = DATA.filter(d => {
    if (activePromos.size && !activePromos.has(d.discount)) return false;
    if (activeCats.size && !activeCats.has(d.category)) return false;
    if (q && !d.name.toLowerCase().includes(q)) return false;
    return true;
  });

  // Sort
  if (sortBy === 'unit-price') {
    filtered.sort((a, b) => parseUnitPrice(a.unitPrice) - parseUnitPrice(b.unitPrice));
  } else if (sortBy === 'price') {
    filtered.sort((a, b) => (parseFloat(a.price) || Infinity) - (parseFloat(b.price) || Infinity));
  }

  // Compute "bon prix" within filtered results
  const bonPrix = computeBonPrix(filtered);

  document.getElementById('results-count').textContent = `${filtered.length} produit${filtered.length > 1 ? 's' : ''}`;

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">Aucun produit ne correspond aux filtres.</div>';
    return;
  }

  grid.innerHTML = filtered.map((d, i) => `
    <div class="card">
      ${d.image ? `<img class="card-img" src="${esc(d.image)}" alt="" loading="lazy">` : ''}
      <div class="card-body">
        <div class="card-top">
          <div class="card-name">${esc(d.name)}</div>
          <div>
            <div class="card-price">${d.price ? d.price + ' \u20ac' : ''}</div>
            ${d.unitPrice ? `<div class="card-unit">${esc(d.unitPrice)}</div>` : ''}
          </div>
        </div>
        <div class="card-bottom">
          <span class="badge ${getBadgeClass(d.discount)}">${esc(d.discount)}</span>
          ${bonPrix.has(i) ? '<span class="badge badge-bon-prix">Bon prix/unit\u00e9</span>' : ''}
          <span class="card-cat">${esc(d.category)}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function esc(s) {
  const el = document.createElement('span');
  el.textContent = s;
  return el.innerHTML;
}

function buildChips(containerId, values, activeSet) {
  const el = document.getElementById(containerId);
  const counts = {};
  DATA.forEach(d => {
    const v = containerId === 'promo-chips' ? d.discount : d.category;
    counts[v] = (counts[v] || 0) + 1;
  });

  el.innerHTML = values.map(v =>
    `<button class="chip${activeSet.has(v) ? ' active' : ''}" data-value="${esc(v)}">${esc(v)}<span class="count">${counts[v] || 0}</span></button>`
  ).join('');

  el.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const val = chip.dataset.value;
      if (activeSet.has(val)) activeSet.delete(val);
      else activeSet.add(val);
      chip.classList.toggle('active');
      render();
    });
  });
}

async function init() {
  try {
    const res = await fetch('data.json');
    const json = await res.json();
    DATA = json.deals;

    const d = new Date(json.updated);
    document.getElementById('meta').textContent =
      `${json.count} promos \u00b7 mis \u00e0 jour le ${d.toLocaleDateString('fr-FR')} \u00e0 ${d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})}`;

    const promos = [...new Set(DATA.map(d => d.discount))].sort();
    const cats = [...new Set(DATA.map(d => d.category))].sort();

    buildChips('promo-chips', promos, activePromos);
    buildChips('cat-chips', cats, activeCats);

    document.getElementById('search').addEventListener('input', render);
    document.getElementById('sort').addEventListener('change', render);
    render();
  } catch (e) {
    document.getElementById('meta').textContent = 'Erreur de chargement des donn\u00e9es.';
  }
}

init();
</script>
</body>
</html>
