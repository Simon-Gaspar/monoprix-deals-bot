<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promos Monoprix</title>
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --muted: #888;
    --accent: #ff6b35;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 2rem 1.5rem 1rem;
    max-width: 1400px;
    margin: 0 auto;
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
  }
  header h1 span { color: var(--accent); }
  .meta {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
  }

  /* Filters */
  .filters {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 1.5rem 1rem;
  }
  .filter-group {
    margin-bottom: 1rem;
  }
  .filter-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .chip {
    padding: 0.35rem 0.75rem;
    border-radius: 2rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--text); color: var(--text); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chip .count {
    font-size: 0.7rem;
    opacity: 0.7;
    margin-left: 0.25rem;
  }

  /* Search */
  .search-wrap {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 1.5rem 1rem;
  }
  .search-wrap input {
    width: 100%;
    max-width: 400px;
    padding: 0.6rem 1rem;
    border-radius: 0.5rem;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  /* Sort */
  .sort-wrap {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 1.5rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .sort-wrap label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
  }
  .sort-wrap select {
    padding: 0.4rem 0.6rem;
    border-radius: 0.5rem;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 0.8rem;
    outline: none;
    cursor: pointer;
  }
  .sort-wrap select:focus { border-color: var(--accent); }

  /* Grid */
  .grid {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 1.5rem 3rem;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 0.75rem;
    padding: 0.75rem;
    display: flex;
    gap: 0.75rem;
    align-items: center;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: #444; }
  .card-img {
    width: 72px;
    height: 72px;
    border-radius: 0.5rem;
    object-fit: contain;
    background: #fff;
    flex-shrink: 0;
  }
  .card-body {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.5rem;
  }
  .card-name {
    font-size: 0.85rem;
    font-weight: 500;
    line-height: 1.3;
    flex: 1;
  }
  .card-price {
    font-size: 1.1rem;
    font-weight: 700;
    white-space: nowrap;
    color: #fff;
  }
  .card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.5rem;
  }
  .badge {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.2rem 0.5rem;
    border-radius: 0.3rem;
    white-space: nowrap;
  }
  .badge-21 { background: #22c55e22; color: #4ade80; border: 1px solid #22c55e44; }
  .badge-60 { background: #ef444422; color: #f87171; border: 1px solid #ef444444; }
  .badge-50 { background: #f9731622; color: #fb923c; border: 1px solid #f9731644; }
  .badge-30 { background: #eab30822; color: #fbbf24; border: 1px solid #eab30844; }
  .badge-20 { background: #3b82f622; color: #60a5fa; border: 1px solid #3b82f644; }
  .badge-default { background: #6b728022; color: #9ca3af; border: 1px solid #6b728044; }
  .badge-bon-prix { background: #10b98122; color: #34d399; border: 1px solid #10b98144; font-size: 0.65rem; }
  .badge-above-median { background: #6b728022; color: #9ca3af; border: 1px solid #6b728044; font-size: 0.65rem; }
  .card-unit {
    font-size: 0.7rem;
    color: var(--muted);
  }
  .card-unit-original {
    text-decoration: line-through;
    opacity: 0.5;
  }
  .card-unit-discounted {
    color: #4ade80;
    font-weight: 600;
  }
  .card-ref {
    font-size: 0.65rem;
    color: var(--muted);
    opacity: 0.7;
  }
  .other-prices {
    margin-top: 0.25rem;
    font-size: 0.65rem;
    color: var(--muted);
    line-height: 1.4;
  }
  .other-prices .op-row {
    display: flex;
    justify-content: space-between;
    gap: 0.3rem;
  }
  .other-prices .op-store { opacity: 0.8; }
  .other-prices .op-price { font-weight: 600; color: var(--text); }
  .badge-cheapest { background: #22c55e22; color: #4ade80; border: 1px solid #22c55e44; font-size: 0.6rem; }
  .badge-cheaper-elsewhere { background: #ef444422; color: #f87171; border: 1px solid #ef444444; font-size: 0.6rem; }
  .card-sparkline {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    margin-top: 0.15rem;
  }
  .card-sparkline svg { display: block; }
  .card-trend {
    font-size: 0.65rem;
    font-weight: 600;
  }
  .card-trend.down { color: #4ade80; }
  .card-trend.up { color: #f87171; }
  .card-trend.stable { color: var(--muted); }
  .sparkline-tooltip {
    font-size: 0.6rem;
    color: var(--muted);
    opacity: 0.7;
  }
  .card-cat {
    font-size: 0.7rem;
    color: var(--muted);
  }
  .card-link {
    font-size: 0.65rem;
    color: var(--accent);
    text-decoration: none;
    opacity: 0.8;
  }
  .card-link:hover { opacity: 1; text-decoration: underline; }
  .card-since {
    font-size: 0.6rem;
    color: var(--muted);
    opacity: 0.7;
  }

  .results-count {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 1.5rem 0.75rem;
    font-size: 0.85rem;
    color: var(--muted);
  }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 3rem;
    color: var(--muted);
  }

  /* Favorites */
  .fav-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    padding: 0.15rem;
    color: var(--muted);
    opacity: 0.5;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .fav-btn:hover { opacity: 1; }
  .fav-btn.active { color: var(--accent); opacity: 1; }
  .fav-filter {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 1rem;
  }
  .fav-toggle {
    padding: 0.35rem 0.75rem;
    border-radius: 2rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .fav-toggle:hover { border-color: var(--text); color: var(--text); }
  .fav-toggle.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .list-summary {
    display: none;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    padding: 0.75rem 1rem;
    margin-bottom: 1rem;
    max-width: 1400px;
  }
  .list-summary.visible { display: block; }
  .list-summary h3 {
    font-size: 0.85rem;
    margin-bottom: 0.5rem;
    color: var(--text);
  }
  .list-summary .store-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.2rem 0;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .list-summary .store-row.monoprix { color: var(--accent); font-weight: 600; }
  .list-summary .store-row .total { font-weight: 600; color: var(--text); }
  .list-summary .store-row.cheapest .total { color: #4ade80; }
  .list-summary .store-note {
    font-size: 0.65rem;
    color: var(--muted);
    opacity: 0.6;
    margin-top: 0.3rem;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    header { padding: 1.5rem 1rem 0.75rem; }
    .filters, .search-wrap, .grid, .results-count { padding-left: 1rem; padding-right: 1rem; }
  }
</style>
</head>
<body>

<header>
  <h1><span>Promos</span> Monoprix</h1>
  <div class="meta" id="meta">Chargement...</div>
</header>

<div class="search-wrap">
  <input type="text" id="search" placeholder="Rechercher un produit...">
</div>

<div class="sort-wrap">
  <label for="sort">Trier par</label>
  <select id="sort">
    <option value="default">Par défaut</option>
    <option value="best-deal">Meilleur deal vs rayon</option>
    <option value="discounted-unit-price">Prix/unité avec promo</option>
    <option value="price">Prix croissant</option>
  </select>
</div>

<div class="filters">
  <div class="fav-filter">
    <button class="fav-toggle" id="fav-filter" onclick="showFavOnly=!showFavOnly;this.classList.toggle('active');render()">&#9829; Ma liste de courses <span id="fav-count">0</span></button>
  </div>
  <div class="list-summary" id="list-summary"></div>
  <div class="filter-group">
    <div class="filter-label">Type de promo</div>
    <div class="chips" id="promo-chips"></div>
  </div>
  <div class="filter-group">
    <div class="filter-label">Rayon</div>
    <div class="chips" id="cat-chips"></div>
  </div>
</div>

<div class="results-count" id="results-count"></div>
<div class="grid" id="grid"></div>

<script>
let DATA = [];
let REF_PRICES = {};
let HISTORY = {};
let activePromos = new Set();
let activeCats = new Set();
let favorites = new Set(JSON.parse(localStorage.getItem('favorites') || '[]'));
let showFavOnly = false;

function toggleFavorite(id) {
  if (favorites.has(id)) favorites.delete(id);
  else favorites.add(id);
  localStorage.setItem('favorites', JSON.stringify([...favorites]));
  updateFavCount();
  render();
}

function updateFavCount() {
  const el = document.getElementById('fav-count');
  if (el) el.textContent = favorites.size;
}

const BADGE_CLASSES = {
  '2 +1 offert': 'badge-21',
  '2+1 offert': 'badge-21',
  '-68%': 'badge-60',
  '-60%': 'badge-60',
  '-50%': 'badge-50',
  '-34%': 'badge-30',
  '-30%': 'badge-30',
  '-20%': 'badge-20',
};

function getBadgeClass(discount) {
  for (const [k, v] of Object.entries(BADGE_CLASSES)) {
    if (discount.toLowerCase().includes(k.toLowerCase())) return v;
  }
  return 'badge-default';
}

function parseUnitPrice(s) {
  if (!s) return Infinity;
  const m = s.match(/([\d.,]+)/);
  return m ? parseFloat(m[1].replace(',', '.')) : Infinity;
}

function parseUnit(s) {
  if (!s) return '';
  const m = s.match(/€(.+)$/);
  return m ? m[1].trim() : '';
}

function getRefComparison(d) {
  // Compare discounted unit price to subcategory median
  const up = parseUnitPrice(d.discountedUnitPrice || d.unitPrice);
  const unit = parseUnit(d.discountedUnitPrice || d.unitPrice);
  // Skip /each — units are often not comparable (per item vs per box)
  if (up === Infinity || !unit || !d.subcategory || unit === '/each') return null;
  const key = d.subcategory + '|' + unit;
  const ref = REF_PRICES[key];
  if (!ref) return null;
  const pct = Math.round((1 - up / ref.median) * 100);
  return { pct, median: ref.median, unit, count: ref.count, label: ref.label || d.subcategory };
}

function getPromoSince(d) {
  if (!d.id || !HISTORY[d.id]) return '';
  const dates = Object.keys(HISTORY[d.id].prices).sort();
  if (!dates.length) return '';
  return dates[0].split('-').reverse().join('/');
}

function buildSparkline(d) {
  if (!d.id || !HISTORY[d.id]) return '';
  const hist = HISTORY[d.id].prices;
  const dates = Object.keys(hist).sort();
  if (dates.length < 2) return '';

  const prices = dates.map(dt => parseFloat(hist[dt].price) || 0).filter(p => p > 0);
  if (prices.length < 2) return '';

  const W = 80, H = 24, pad = 2;
  const min = Math.min(...prices);
  const max = Math.max(...prices);
  const range = max - min || 1;

  const points = prices.map((p, i) => {
    const x = pad + (i / (prices.length - 1)) * (W - 2 * pad);
    const y = pad + (1 - (p - min) / range) * (H - 2 * pad);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');

  // Trend: compare last vs first
  const first = prices[0];
  const last = prices[prices.length - 1];
  const diff = last - first;
  const pctChange = Math.round((diff / first) * 100);
  let color, trendClass, arrow;
  if (pctChange < -1) { color = '#4ade80'; trendClass = 'down'; arrow = '\u2193'; }
  else if (pctChange > 1) { color = '#f87171'; trendClass = 'up'; arrow = '\u2191'; }
  else { color = '#888'; trendClass = 'stable'; arrow = '='; }

  const firstDate = dates[0];
  const tooltip = `depuis le ${firstDate.split('-').reverse().join('/')}`;

  return `<div class="card-sparkline">
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span class="card-trend ${trendClass}">${arrow}${Math.abs(pctChange) > 0 ? Math.abs(pctChange) + '%' : ''}</span>
    <span class="sparkline-tooltip">${tooltip}</span>
  </div>`;
}

function updateListSummary(favDeals) {
  const el = document.getElementById('list-summary');
  if (!showFavOnly || !favDeals.length) {
    el.classList.remove('visible');
    return;
  }
  // Monoprix total (promo price)
  let monoTotal = 0;
  let monoCount = 0;
  const storeTotals = {}; // {storeName: {total, count}}
  for (const d of favDeals) {
    const p = parseFloat(d.price);
    if (p) { monoTotal += p; monoCount++; }
    const op = d.otherPrices || [];
    for (const o of op) {
      if (!storeTotals[o.store]) storeTotals[o.store] = {total: 0, count: 0};
      storeTotals[o.store].total += o.price;
      storeTotals[o.store].count++;
    }
  }
  // Only show stores that have prices for at least 2 products
  const stores = Object.entries(storeTotals)
    .filter(([, v]) => v.count >= 2)
    .sort((a, b) => b[1].count - a[1].count)
    .slice(0, 5);
  const cheapestTotal = stores.length ? Math.min(...stores.map(([, v]) => v.total)) : Infinity;
  let html = `<h3>Ma liste de courses (${monoCount} produit${monoCount > 1 ? 's' : ''})</h3>`;
  html += `<div class="store-row monoprix"><span>Monoprix (promo)</span><span class="total">${monoTotal.toFixed(2)} \u20ac</span></div>`;
  for (const [store, v] of stores) {
    const isCheapest = v.total <= cheapestTotal;
    html += `<div class="store-row${isCheapest ? ' cheapest' : ''}"><span>${store} <small>(${v.count}/${monoCount} produits)</small></span><span class="total">${v.total.toFixed(2)} \u20ac</span></div>`;
  }
  if (!stores.length) {
    html += `<div class="store-note">Aucun prix compar\u00e9 disponible pour ces produits.</div>`;
  } else {
    html += `<div class="store-note">Estimations bas\u00e9es sur les derniers prix connus (Open Prices). Comparaison partielle.</div>`;
  }
  el.innerHTML = html;
  el.classList.add('visible');
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const sortBy = document.getElementById('sort').value;
  const grid = document.getElementById('grid');

  const filtered = DATA.filter(d => {
    if (showFavOnly && !favorites.has(d.id)) return false;
    if (activePromos.size && !activePromos.has(d.discount)) return false;
    if (activeCats.size && !activeCats.has(d.category)) return false;
    if (q && !d.name.toLowerCase().includes(q)) return false;
    return true;
  });

  // Sort
  if (sortBy === 'best-deal') {
    filtered.sort((a, b) => {
      const ra = getRefComparison(a);
      const rb = getRefComparison(b);
      const pa = ra ? ra.pct : -9999;
      const pb = rb ? rb.pct : -9999;
      return pb - pa; // highest % below median first
    });
  } else if (sortBy === 'discounted-unit-price') {
    filtered.sort((a, b) => parseUnitPrice(a.discountedUnitPrice || a.unitPrice) - parseUnitPrice(b.discountedUnitPrice || b.unitPrice));
  } else if (sortBy === 'price') {
    filtered.sort((a, b) => (parseFloat(a.price) || Infinity) - (parseFloat(b.price) || Infinity));
  }

  document.getElementById('results-count').textContent = `${filtered.length} produit${filtered.length > 1 ? 's' : ''}`;
  updateListSummary(filtered);

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">Aucun produit ne correspond aux filtres.</div>';
    return;
  }

  grid.innerHTML = filtered.map((d, i) => {
    const ref = getRefComparison(d);
    let refHtml = '';
    if (ref) {
      if (ref.pct > 0) {
        refHtml = `<span class="badge badge-bon-prix">${ref.pct}% sous la m\u00e9diane du rayon</span>`;
      } else if (ref.pct < 0) {
        refHtml = `<span class="badge badge-above-median">${Math.abs(ref.pct)}% au-dessus</span>`;
      }
    }
    const spark = buildSparkline(d);
    const since = getPromoSince(d);
    const productUrl = 'https://courses.monoprix.fr/search?q=' + encodeURIComponent(d.name);
    const op = d.otherPrices || [];
    let otherHtml = '';
    let cheapBadge = '';
    if (op.length && d.price) {
      const monoPrice = parseFloat(d.price);
      const cheapest = op[0];
      if (cheapest.price < monoPrice) {
        cheapBadge = `<span class="badge badge-cheaper-elsewhere">Moins cher ailleurs</span>`;
      } else {
        cheapBadge = `<span class="badge badge-cheapest">Moins cher ici</span>`;
      }
      otherHtml = `<div class="other-prices">${op.slice(0, 3).map(p =>
        `<div class="op-row"><span class="op-store">${esc(p.store)}</span><span class="op-price">${Number(p.price).toFixed(2)} \u20ac</span></div>`
      ).join('')}</div>`;
    }
    return `
    <div class="card">
      ${d.image ? `<a href="${productUrl}" target="_blank" rel="noopener"><img class="card-img" src="${esc(d.image)}" alt="" loading="lazy"></a>` : ''}
      <div class="card-body">
        <div class="card-top">
          <button class="fav-btn${favorites.has(d.id) ? ' active' : ''}" onclick="event.stopPropagation();toggleFavorite('${esc(d.id)}')">${favorites.has(d.id) ? '\u2665' : '\u2661'}</button>
          <div class="card-name"><a href="${productUrl}" target="_blank" rel="noopener" class="card-link" style="color:var(--text);font-size:inherit;opacity:1">${esc(d.name)}</a></div>
          <div>
            <div class="card-price">${d.price ? d.price + ' \u20ac' : ''}</div>
            ${d.discountedUnitPrice ? `<div class="card-unit"><span class="card-unit-original">${esc(d.unitPrice)}</span> <span class="card-unit-discounted">${esc(d.discountedUnitPrice)}</span></div>` : d.unitPrice ? `<div class="card-unit">${esc(d.unitPrice)}</div>` : ''}
            ${ref ? `<div class="card-ref">m\u00e9diane ${esc(ref.label)}: ${ref.median.toFixed(2)} \u20ac${ref.unit}</div>` : ''}
            ${otherHtml}
          </div>
        </div>
        ${spark}
        <div class="card-bottom">
          <span class="badge ${getBadgeClass(d.discount)}">${esc(d.discount)}</span>
          ${refHtml}
          ${cheapBadge}
          ${since ? `<span class="card-since">depuis le ${since}</span>` : ''}
          <span class="card-cat">${esc(d.category)}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function esc(s) {
  const el = document.createElement('span');
  el.textContent = s;
  return el.innerHTML;
}

function buildChips(containerId, values, activeSet) {
  const el = document.getElementById(containerId);
  const counts = {};
  DATA.forEach(d => {
    const v = containerId === 'promo-chips' ? d.discount : d.category;
    counts[v] = (counts[v] || 0) + 1;
  });

  el.innerHTML = values.map(v =>
    `<button class="chip${activeSet.has(v) ? ' active' : ''}" data-value="${esc(v)}">${esc(v)}<span class="count">${counts[v] || 0}</span></button>`
  ).join('');

  el.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const val = chip.dataset.value;
      if (activeSet.has(val)) activeSet.delete(val);
      else activeSet.add(val);
      chip.classList.toggle('active');
      render();
    });
  });
}

async function init() {
  try {
    const [res, histRes] = await Promise.all([
      fetch('data.json'),
      fetch('history.json').catch(() => null)
    ]);
    const json = await res.json();
    DATA = json.deals;
    REF_PRICES = json.referencePrices || {};
    if (histRes && histRes.ok) {
      HISTORY = await histRes.json();
    }

    const d = new Date(json.updated);
    document.getElementById('meta').textContent =
      `${json.count} promos \u00b7 mis \u00e0 jour le ${d.toLocaleDateString('fr-FR')} \u00e0 ${d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})}`;

    const promos = [...new Set(DATA.map(d => d.discount))].sort();
    const cats = [...new Set(DATA.map(d => d.category))].sort();

    buildChips('promo-chips', promos, activePromos);
    buildChips('cat-chips', cats, activeCats);

    document.getElementById('search').addEventListener('input', render);
    document.getElementById('sort').addEventListener('change', render);
    updateFavCount();
    render();
  } catch (e) {
    document.getElementById('meta').textContent = 'Erreur de chargement des donn\u00e9es.';
  }
}

init();
</script>
</body>
</html>
